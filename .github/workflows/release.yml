name: Release Obsidian Plugin

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.2.0
          name: v0.2.0
          body: |
            Google Trans Obsidian v0.2.0

            Changes:
            - Better Markdown protection
            - Retry with exponential backoff
            - Clear translation logs
            - Status bar progress
            - Max note length guard
            - Release assets for BRAT/mobile install
          files: |
            manifest.json
            main.js
            versions.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
