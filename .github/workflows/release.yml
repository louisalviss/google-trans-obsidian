name: Release Obsidian Plugin

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.3.0
          name: v0.3.0
          body: |
            Google Trans Obsidian v0.3.0

            Changes:
            - Visible loading overlay on mobile/desktop
            - Faster translation with larger chunks
            - Parallel translation requests
            - Progress bar with request counter
            - Retry with backoff
            - Translation log modal
            - Markdown protection retained
          files: |
            manifest.json
            main.js
            versions.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
